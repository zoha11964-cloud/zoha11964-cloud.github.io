<script>
document.addEventListener('DOMContentLoaded', function() {
    let growthChart = null;

    const initialInv = document.getElementById('initialInv');
    const intRate = document.getElementById('intRate');
    const invYears = document.getElementById('invYears');
    const monthDeposit = document.getElementById('monthDeposit');
    const compFreq = document.getElementById('compFreq');
    const calcBtn = document.getElementById('calcBtn');
    const futureVal = document.getElementById('futureVal');
    const totalContrib = document.getElementById('totalContrib');
    const totalInterest = document.getElementById('totalInterest');
    const returnPct = document.getElementById('returnPct');
    const resultYears = document.getElementById('resultYears');
    const copyResult = document.getElementById('copyResult');
    const topHookLink = document.getElementById('topHookLink');
    const bottomHookLink = document.getElementById('bottomHookLink');

    const presetConfig = {
        retirement: { initial:50000, rate:7.0, years:30, monthly:800, topText:"Handy tips for your Retirement plan", bottomText:"Discover smart ways to build your retirement savings", link:"/guides.html#retirement-fund" },
        home: { initial:15000, rate:4.5, years:5, monthly:1000, topText:"Practical advice for Investment growth", bottomText:"Find reliable ways to save for your home down payment", link:"/guides.html#home-down-payment" },
        college: { initial:10000, rate:6.0, years:15, monthly:300, topText:"Smart ideas for Education savings", bottomText:"Use proven tactics to fund future education costs", link:"/guides.html#education-fund" },
        emergency: { initial:5000, rate:2.5, years:3, monthly:500, topText:"Learn useful tips for Emergency Fund", bottomText:"See how to build a solid emergency fund easily", link:"/guides.html#emergency-fund" }
    };

    function formatCurrency(num) {
        return new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2 }).format(num||0);
    }

    function calculateTotal() {
        const P = Number(initialInv.value)||0;
        const rate = Number(intRate.value)||0;
        const years = Number(invYears.value)||0;
        const monthlyAdd = Number(monthDeposit.value)||0;
        const compoundTimes = Number(compFreq.value);
        resultYears.textContent = years;
        const totalMonth = years*12;
        const totalPaid = P + (monthlyAdd*totalMonth);
        const annualRate = rate/100;
        let finalAmount = 0;

        if (compoundTimes === 1) {
            if (annualRate === 0) finalAmount = totalPaid;
            else finalAmount = P*Math.pow(1+annualRate,years) + monthlyAdd*12*(Math.pow(1+annualRate,years)-1)/annualRate;
        } else {
            const monthlyRate = annualRate/12;
            if (monthlyRate === 0) finalAmount = totalPaid;
            else finalAmount = P*Math.pow(1+monthlyRate,totalMonth) + monthlyAdd*(Math.pow(1+monthlyRate,totalMonth)-1)/monthlyRate;
        }

        const interest = finalAmount - totalPaid;
        const pct = totalPaid>0 ? (interest/totalPaid*100).toFixed(2) : 0;
        futureVal.textContent = formatCurrency(finalAmount);
        totalContrib.textContent = formatCurrency(totalPaid);
        totalInterest.textContent = formatCurrency(interest);
        returnPct.textContent = pct+'%';
        updateChart();
    }

    function updateChart() {
        const years = Number(invYears.value) || 20;
        const P = Number(initialInv.value) || 0;
        const rate = Number(intRate.value) || 0;
        const monthlyAdd = Number(monthDeposit.value) || 0;
        const compoundTimes = Number(compFreq.value);
        const annualRate = rate / 100;

        const labels = [];
        const balanceData = [];
        const principalData = [];

        for (let i = 0; i <= years; i++) {
            labels.push(i + 'Y');
            const totalMonths = i * 12;
            const principal = P + monthlyAdd * totalMonths;
            principalData.push(Math.round(principal));

            let balance = P;
            if (compoundTimes === 1) {
                if (annualRate === 0) {
                    balance = principal;
                } else {
                    balance = P * Math.pow(1 + annualRate, i) +
                              monthlyAdd * 12 * (Math.pow(1 + annualRate, i) - 1) / annualRate;
                }
            } else {
                const months = i * 12;
                const monthlyRate = annualRate / 12;
                if (monthlyRate === 0) {
                    balance = principal;
                } else {
                    balance = P * Math.pow(1 + monthlyRate, months) +
                              monthlyAdd * (Math.pow(1 + monthlyRate, months) - 1) / monthlyRate;
                }
            }
            balanceData.push(Math.round(balance));
        }

        if (growthChart) {
            growthChart.destroy();
        }

        const ctx = document.getElementById('growthChart').getContext('2d');
        growthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Total Balance',
                        data: balanceData,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37,99,235,0.1)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 2
                    },
                    {
                        label: 'Total Contributions',
                        data: principalData,
                        borderColor: '#059669',
                        backgroundColor: 'rgba(5,150,105,0.05)',
                        fill: false,
                        tension: 0.3,
                        borderWidth: 1.5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            boxWidth: 12,
                            font: { size: 12 }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return '$' + value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }

    calcBtn.addEventListener('click', calculateTotal);

    copyResult.addEventListener('click', function() {
        const text = `Final Value: ${futureVal.textContent}\nTotal Contributions: ${totalContrib.textContent}\nTotal Interest: ${totalInterest.textContent}\nInterest Ratio: ${returnPct.textContent}`;
        navigator.clipboard.writeText(text).then(() => {
            const oldText = copyResult.innerHTML;
            copyResult.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            setTimeout(() => { copyResult.innerHTML = oldText; }, 1500);
        });
    });

    // 快捷填充按钮
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const key = this.dataset.preset;
            const cfg = presetConfig[key];
            if(!cfg) return;
            initialInv.value = cfg.initial;
            intRate.value = cfg.rate;
            invYears.value = cfg.years;
            monthDeposit.value = cfg.monthly;
            topHookLink.textContent = `<i class="fa-solid fa-lightbulb"></i> ${cfg.topText}`;
            topHookLink.href = cfg.link;
            bottomHookLink.textContent = `<i class="fa-solid fa-book-open"></i> ${cfg.bottomText}`;
            bottomHookLink.href = cfg.link;
            calculateTotal();
        });
    });

    // FAQ 展开收起
    document.querySelectorAll('.faq-question').forEach(item => {
        item.addEventListener('click', function() {
            const answer = this.nextElementSibling;
            const icon = this.querySelector('i');
            const parent = this.closest('.faq-item');

            // 关闭其他
            document.querySelectorAll('.faq-question').forEach(q => {
                q.classList.remove('active');
                q.nextElementSibling.classList.remove('show');
                q.querySelector('i').classList.replace('fa-chevron-up','fa-chevron-down');
            });

            // 切换当前
            this.classList.toggle('active');
            answer.classList.toggle('show');
            if(answer.classList.contains('show')){
                icon.classList.replace('fa-chevron-down','fa-chevron-up');
            }else{
                icon.classList.replace('fa-chevron-up','fa-chevron-down');
            }
        });
    });

    // 初始执行一次计算
    calculateTotal();
});
</script>
</body>
</html>
